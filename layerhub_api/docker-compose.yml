services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "rm -f tmp/pids/server.pid && rails server -b 0.0.0.0"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - storage:/app/storage
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bundle exec sidekiq
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  bundle_cache:
  storage:
